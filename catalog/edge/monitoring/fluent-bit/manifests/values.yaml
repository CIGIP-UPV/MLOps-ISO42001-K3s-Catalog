# =============================================================================
# Fluent Bit — Edge Log Collector & Forwarder
# Helm chart: fluent/fluent-bit
# Tier: Edge | RA Component: Logger (Edge)
# ISO/IEC 42001: B.6.2.8.1
# =============================================================================

image:
  repository: fluent/fluent-bit
  tag: "3.0"

# -----------------------------------------------------------------------------
# DaemonSet — runs on every edge node
# -----------------------------------------------------------------------------
kind: DaemonSet

# -----------------------------------------------------------------------------
# Service — for metrics scraping
# -----------------------------------------------------------------------------
service:
  type: ClusterIP
  port: 2020
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "2020"
    prometheus.io/path: "/api/v1/metrics/prometheus"

# -----------------------------------------------------------------------------
# Fluent Bit configuration
# -----------------------------------------------------------------------------
config:
  # Service configuration
  service: |
    [SERVICE]
        Daemon          Off
        Flush           5
        Log_Level       info
        Parsers_File    /fluent-bit/etc/parsers.conf
        HTTP_Server     On
        HTTP_Listen     0.0.0.0
        HTTP_Port       2020
        Health_Check    On

  # Input — collect container logs from K3S
  inputs: |
    [INPUT]
        Name              tail
        Tag               kube.*
        Path              /var/log/containers/*.log
        Parser            cri
        DB                /var/log/flb_kube.db
        Mem_Buf_Limit     10MB
        Skip_Long_Lines   On
        Refresh_Interval  10

    [INPUT]
        Name              systemd
        Tag               host.*
        Systemd_Filter    _SYSTEMD_UNIT=k3s.service
        Read_From_Tail    On

  # Filters — enrich with Kubernetes metadata
  filters: |
    [FILTER]
        Name                kubernetes
        Match               kube.*
        Kube_URL            https://kubernetes.default.svc:443
        Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
        Kube_Tag_Prefix     kube.var.log.containers.
        Merge_Log           On
        Keep_Log            Off
        K8S-Logging.Parser  On
        K8S-Logging.Exclude Off
        Labels              On
        Annotations         Off

    [FILTER]
        Name    modify
        Match   kube.*
        Add     tier edge
        Add     cluster edge-cluster

  # Outputs — forward to Loki on platform tier
  outputs: |
    [OUTPUT]
        Name              loki
        Match             *
        Host              loki.monitoring.svc.cluster.local
        Port              3100
        Labels            job=fluent-bit,tier=edge
        Label_Keys        $kubernetes['namespace_name'],$kubernetes['pod_name']
        Auto_Kubernetes_Labels On
        Retry_Limit       5

    # Fallback: buffer to local file if Loki unreachable
    [OUTPUT]
        Name              file
        Match             *
        Path              /var/log/fluent-bit-buffer
        Format            plain

  # Custom parsers
  customParsers: |
    [PARSER]
        Name        cri
        Format      regex
        Regex       ^(?<time>[^ ]+) (?<stream>stdout|stderr) (?<logtag>[^ ]*) (?<message>.*)$
        Time_Key    time
        Time_Format %Y-%m-%dT%H:%M:%S.%L%z

# -----------------------------------------------------------------------------
# Volume mounts — access node logs
# -----------------------------------------------------------------------------
volumeMounts:
  - name: varlog
    mountPath: /var/log
  - name: varlibdockercontainers
    mountPath: /var/lib/docker/containers
    readOnly: true
  - name: runlogjournal
    mountPath: /run/log/journal
    readOnly: true
  - name: buffer
    mountPath: /var/log/fluent-bit-buffer

volumes:
  - name: varlog
    hostPath:
      path: /var/log
  - name: varlibdockercontainers
    hostPath:
      path: /var/lib/docker/containers
  - name: runlogjournal
    hostPath:
      path: /run/log/journal
  - name: buffer
    hostPath:
      path: /var/log/fluent-bit-buffer
      type: DirectoryOrCreate

# -----------------------------------------------------------------------------
# Resources
# -----------------------------------------------------------------------------
resources:
  requests:
    cpu: "50m"
    memory: "64Mi"
  limits:
    cpu: "200m"
    memory: "256Mi"

# -----------------------------------------------------------------------------
# Node placement — run on all edge nodes
# -----------------------------------------------------------------------------
nodeSelector:
  node-role.kubernetes.io/edge: "true"

tolerations:
  - operator: Exists
    effect: NoSchedule
