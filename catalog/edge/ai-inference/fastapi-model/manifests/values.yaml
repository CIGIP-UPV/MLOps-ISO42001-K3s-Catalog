# =============================================================================
# FastAPI Model Server — Edge AI Inference
# Helm Chart Values
# Tier: Edge | RA Component: Edge AI Model
# ISO/IEC 42001: B.6.1.2.2, B.6.1.3.4, B.6.2.6.1
# =============================================================================

replicaCount: 1

image:
  repository: your-registry/fastapi-model
  pullPolicy: IfNotPresent
  tag: "1.0.0"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: false
  annotations: {}
  name: ""

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8000"
  prometheus.io/path: "/metrics"

podSecurityContext:
  runAsNonRoot: false

securityContext: {}

# FastAPI model configuration
config:
  modelPath: "/models/model.onnx"
  modelVersion: "1.0.0"
  logPredictions: "true"
  logLevel: "INFO"
  # PostgreSQL connection for prediction logging (B.6.2.8.1)
  dbHost: "postgresql.edge.svc.cluster.local"
  dbPort: "5432"
  dbName: "predictions"

# Database authentication
auth:
  dbUser: "fastapi"
  dbPassword: "CHANGE_ME"  # Replace with actual secure password

service:
  type: ClusterIP
  annotations: {}
  port: 8000

# Optional Ingress
ingress:
  enabled: false
  className: traefik
  annotations: {}
  hostname: model.edge.local
  tls: []

persistence:
  enabled: true
  storageClass: local-path
  size: 5Gi

resources:
  limits:
    cpu: 2000m
    memory: 2Gi
  requests:
    cpu: 500m
    memory: 512Mi

# GPU support (uncomment to enable)
# gpuResources:
#   nvidia.com/gpu: "1"

# Node selector for edge nodes
nodeSelector:
  node-role.kubernetes.io/edge: "true"

tolerations: []

affinity: {}

# Deployment strategy
strategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 0
    maxSurge: 1

# Health check probes
livenessProbe:
  httpGet:
    path: /health
    port: 8000
  initialDelaySeconds: 30
  periodSeconds: 15
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /ready
    port: 8000
  initialDelaySeconds: 15
  periodSeconds: 5
  timeoutSeconds: 3
