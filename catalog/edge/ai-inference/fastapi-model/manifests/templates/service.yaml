# =============================================================================
# FastAPI Model Service
# ISO/IEC 42001: B.6.1.2.2, B.6.1.3.4, B.6.2.6.1
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: {{ include "edge-fastapi-model.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "edge-fastapi-model.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "edge-fastapi-model.selectorLabels" . | nindent 4 }}
