# =============================================================================
# FastAPI Model Deployment
# Tier: Edge | RA Component: Edge AI Model
# ISO/IEC 42001: B.6.1.2.2, B.6.1.3.4, B.6.2.6.1
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "edge-fastapi-model.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "edge-fastapi-model.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  {{- with .Values.strategy }}
  strategy:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "edge-fastapi-model.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "edge-fastapi-model.selectorLabels" . | nindent 8 }}
        tier: edge
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: fastapi-model
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "edge-fastapi-model.fullname" . }}-config
            - secretRef:
                name: {{ include "edge-fastapi-model.fullname" . }}-secrets
          volumeMounts:
            - name: model-storage
              mountPath: /models
              readOnly: true
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        {{- if .Values.persistence.enabled }}
        - name: model-storage
          persistentVolumeClaim:
            claimName: {{ include "edge-fastapi-model.fullname" . }}-storage
        {{- else }}
        - name: model-storage
          emptyDir: {}
        {{- end }}
