# =============================================================================
# Node-RED — Edge Data Ingestion & Orchestration
# Helm chart: https://github.com/node-red/node-red-chart (community)
# Tier: Edge | RA Component: Input Data Monitoring, Data Stock
# ISO/IEC 42001: B.6.2.6.4, B.6.2.6.7
# =============================================================================

node-red:
  replicaCount: 1

  image:
    repository: nodered/node-red
    tag: "3.1"
    pullPolicy: IfNotPresent

  # ---------------------------------------------------------------------------
  # Service
  # ---------------------------------------------------------------------------
  service:
    type: ClusterIP
    port: 1880

  # ---------------------------------------------------------------------------
  # Ingress — Traefik (K3S default)
  # ---------------------------------------------------------------------------
  ingress:
    enabled: true
    className: traefik
    annotations:
      traefik.ingress.kubernetes.io/router.entrypoints: web
    hosts:
      - host: node-red.edge.local
        paths:
          - path: /
            pathType: Prefix
    tls: []
    # - secretName: node-red-tls
    #   hosts:
    #     - node-red.edge.local

  # ---------------------------------------------------------------------------
  # Persistence — Required for flow storage and buffering during outages
  # ---------------------------------------------------------------------------
  persistence:
    enabled: true
    storageClass: local-path          # K3S default StorageClass
    accessMode: ReadWriteOnce
    size: 5Gi

  # ---------------------------------------------------------------------------
  # Environment variables
  # ---------------------------------------------------------------------------
  env:
    - name: NODE_RED_ENABLE_PROJECTS
      value: "true"                    # Git-based flow version control
    - name: TZ
      value: "Europe/Madrid"

  # ---------------------------------------------------------------------------
  # Settings — Authentication (B.6.1.3.1: access control)
  # ---------------------------------------------------------------------------
  settings:
    # Enable admin auth if exposing externally
    adminAuth:
      enabled: true
      # Users are configured via Kubernetes Secret
      # secretName: node-red-admin-auth

  # ---------------------------------------------------------------------------
  # Resources
  # ---------------------------------------------------------------------------
  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      cpu: "1000m"
      memory: "1Gi"

  # ---------------------------------------------------------------------------
  # Node placement — Pin to edge nodes
  # ---------------------------------------------------------------------------
  nodeSelector:
    node-role.kubernetes.io/edge: "true"

  tolerations: []
  affinity: {}

  # ---------------------------------------------------------------------------
  # Liveness / Readiness probes
  # ---------------------------------------------------------------------------
  livenessProbe:
    httpGet:
      path: /
      port: 1880
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5

  readinessProbe:
    httpGet:
      path: /
      port: 1880
    initialDelaySeconds: 15
    periodSeconds: 5
    timeoutSeconds: 3
