# =============================================================================
# Eclipse Mosquitto Configuration
# ISO/IEC 42001: B.6.2.6.4
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "edge-mosquitto.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "edge-mosquitto.labels" . | nindent 4 }}
data:
  mosquitto.conf: |
    # Listener
    listener {{ .Values.config.mqttPort }}
    protocol mqtt

    {{- if .Values.config.websocketEnabled }}
    # WebSocket listener
    listener {{ .Values.config.websocketPort }}
    protocol websockets
    {{- end }}

    # Persistence
    persistence {{ .Values.config.persistence | lower }}
    persistence_location {{ .Values.config.persistenceLocation }}

    # Logging
    log_dest {{ .Values.config.logDest }}
    log_type {{ .Values.config.logType }}
    connection_messages {{ .Values.config.connectionMessages | lower }}

    # Authentication — enable for production (B.6.1.3.1)
    allow_anonymous {{ .Values.config.allowAnonymous | lower }}
    password_file /mosquitto/config/passwords.txt

    # Max message size (prevent oversized payloads)
    message_size_limit {{ .Values.config.messageSizeLimit }}
