# =============================================================================
# Eclipse Mosquitto Deployment
# Tier: Edge | RA Component: Input Data Monitoring
# ISO/IEC 42001: B.6.2.6.4
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "edge-mosquitto.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "edge-mosquitto.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "edge-mosquitto.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "edge-mosquitto.selectorLabels" . | nindent 8 }}
        tier: edge
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: mosquitto
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: mqtt
              containerPort: {{ .Values.config.mqttPort }}
              protocol: TCP
            {{- if .Values.config.websocketEnabled }}
            - name: websocket
              containerPort: {{ .Values.config.websocketPort }}
              protocol: TCP
            {{- end }}
          volumeMounts:
            - name: config
              mountPath: /mosquitto/config/mosquitto.conf
              subPath: mosquitto.conf
            - name: passwords
              mountPath: /mosquitto/config/passwords.txt
              subPath: passwords.txt
            {{- if .Values.persistence.enabled }}
            - name: data
              mountPath: /mosquitto/data
            {{- end }}
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "edge-mosquitto.fullname" . }}-config
        - name: passwords
          secret:
            secretName: {{ include "edge-mosquitto.fullname" . }}-passwords
        {{- if .Values.persistence.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "edge-mosquitto.fullname" . }}-data
        {{- end }}
