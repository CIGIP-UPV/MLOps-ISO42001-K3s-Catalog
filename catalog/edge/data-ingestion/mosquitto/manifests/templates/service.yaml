# =============================================================================
# Eclipse Mosquitto Service
# ISO/IEC 42001: B.6.2.6.4
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: {{ include "edge-mosquitto.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "edge-mosquitto.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: mqtt
      port: {{ .Values.service.ports.mqtt }}
      targetPort: mqtt
      protocol: TCP
    {{- if .Values.config.websocketEnabled }}
    - name: websocket
      port: {{ .Values.service.ports.websocket }}
      targetPort: websocket
      protocol: TCP
    {{- end }}
  selector:
    {{- include "edge-mosquitto.selectorLabels" . | nindent 4 }}
