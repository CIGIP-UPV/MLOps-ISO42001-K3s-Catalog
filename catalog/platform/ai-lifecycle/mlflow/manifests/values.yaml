# =============================================================================
# MLflow — AI Lifecycle & Version Control
# Helm chart: community-charts/mlflow
# Tier: Platform | RA Component: Version Control, Retraining Recommendation
# ISO/IEC 42001: B.6.1.3.2, B.6.1.3.4, B.6.2.6.4
# =============================================================================

# -----------------------------------------------------------------------------
# Image
# -----------------------------------------------------------------------------
image:
  repository: ghcr.io/mlflow/mlflow
  tag: "2.14.0"
  pullPolicy: IfNotPresent

replicaCount: 1

# -----------------------------------------------------------------------------
# Backend store — PostgreSQL for metadata
# -----------------------------------------------------------------------------
backendStore:
  postgres:
    enabled: true
    host: postgresql.platform.svc.cluster.local
    port: 5432
    database: mlflow
    user: mlflow
    password: ""                  # Mount from Kubernetes Secret
    # existingSecret: mlflow-db-credentials
    # existingSecretKey: password

# -----------------------------------------------------------------------------
# Artifact store — MinIO (S3-compatible)
# -----------------------------------------------------------------------------
artifactRoot:
  s3:
    enabled: true
    bucket: mlflow-artifacts
    awsAccessKeyId: ""            # Mount from Kubernetes Secret
    awsSecretAccessKey: ""
  s3EnvVars:
    - name: MLFLOW_S3_ENDPOINT_URL
      value: "http://minio.minio.svc.cluster.local:9000"
    - name: AWS_DEFAULT_REGION
      value: "us-east-1"          # MinIO default

# -----------------------------------------------------------------------------
# Service
# -----------------------------------------------------------------------------
service:
  type: ClusterIP
  port: 5000

# -----------------------------------------------------------------------------
# Ingress — Traefik (K3S default)
# -----------------------------------------------------------------------------
ingress:
  enabled: true
  className: traefik
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
    # For authentication via Keycloak OIDC proxy:
    # traefik.ingress.kubernetes.io/router.middlewares: security-oauth2-proxy@kubernetescrd
  hosts:
    - host: mlflow.platform.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
  # - secretName: mlflow-tls
  #   hosts:
  #     - mlflow.platform.local

# -----------------------------------------------------------------------------
# Persistence — local cache for temporary files
# -----------------------------------------------------------------------------
persistence:
  enabled: true
  storageClass: local-path
  size: 10Gi
  accessMode: ReadWriteOnce

# -----------------------------------------------------------------------------
# Resources
# -----------------------------------------------------------------------------
resources:
  requests:
    cpu: "250m"
    memory: "512Mi"
  limits:
    cpu: "1000m"
    memory: "2Gi"

# -----------------------------------------------------------------------------
# Prometheus metrics (B.6.1.2.2)
# -----------------------------------------------------------------------------
serviceMonitor:
  enabled: true
  namespace: monitoring

# -----------------------------------------------------------------------------
# Node placement
# -----------------------------------------------------------------------------
nodeSelector:
  node-role.kubernetes.io/platform: "true"
