# =============================================================================
# Rancher Questions — MLflow (AI Lifecycle & Version Control)
# ISO/IEC 42001: B.6.1.3.2, B.6.1.3.4, B.6.2.6.4
# =============================================================================
categories:
  - "Platform"
  - "AI Lifecycle"

questions:

  # ---- Container Image ----
  - variable: image.tag
    label: "MLflow Version"
    type: string
    default: "2.14.0"
    group: "Container Image"

  - variable: replicaCount
    label: "Replicas"
    type: int
    default: 1
    min: 1
    max: 3
    group: "Container Image"

  # ---- Backend Store (PostgreSQL) ----
  - variable: backendStore.postgres.host
    label: "PostgreSQL Host"
    description: "Platform PostgreSQL for MLflow metadata"
    type: string
    default: "postgresql.platform.svc.cluster.local"
    group: "Backend Store"

  - variable: backendStore.postgres.port
    label: "PostgreSQL Port"
    type: int
    default: 5432
    group: "Backend Store"

  - variable: backendStore.postgres.database
    label: "Database Name"
    type: string
    default: "mlflow"
    group: "Backend Store"

  - variable: backendStore.postgres.user
    label: "Database User"
    type: string
    default: "mlflow"
    group: "Backend Store"

  - variable: backendStore.postgres.password
    label: "Database Password"
    type: password
    default: ""
    required: true
    group: "Backend Store"

  # ---- Artifact Store (MinIO) ----
  - variable: artifactRoot.s3.bucket
    label: "S3 Bucket Name"
    description: "MinIO bucket for model artefacts"
    type: string
    default: "mlflow-artifacts"
    group: "Artifact Store"

  - variable: artifactRoot.s3.awsAccessKeyId
    label: "MinIO Access Key"
    type: string
    default: ""
    required: true
    group: "Artifact Store"

  - variable: artifactRoot.s3.awsSecretAccessKey
    label: "MinIO Secret Key"
    type: password
    default: ""
    required: true
    group: "Artifact Store"

  - variable: artifactRoot.s3EnvVars[0].value
    label: "MinIO Endpoint URL"
    type: string
    default: "http://minio.minio.svc.cluster.local:9000"
    group: "Artifact Store"

  # ---- Networking ----
  - variable: service.type
    label: "Service Type"
    type: enum
    default: "ClusterIP"
    options:
      - "ClusterIP"
      - "NodePort"
      - "LoadBalancer"
    group: "Networking"

  - variable: service.port
    label: "Service Port"
    type: int
    default: 5000
    group: "Networking"

  - variable: ingress.enabled
    label: "Enable Ingress"
    type: boolean
    default: true
    group: "Networking"

  - variable: ingress.hosts[0].host
    label: "Ingress Hostname"
    type: hostname
    default: "mlflow.platform.local"
    show_if: "ingress.enabled=true"
    group: "Networking"

  - variable: ingress.tls[0].secretName
    label: "TLS Secret Name"
    description: "Leave empty for HTTP only"
    type: string
    default: ""
    show_if: "ingress.enabled=true"
    group: "Networking"

  # ---- Persistence ----
  - variable: persistence.storageClass
    label: "Storage Class"
    type: storageclass
    default: "local-path"
    group: "Storage"

  - variable: persistence.size
    label: "Volume Size"
    type: string
    default: "10Gi"
    group: "Storage"

  # ---- Monitoring ----
  - variable: serviceMonitor.enabled
    label: "Enable Prometheus ServiceMonitor"
    description: "Expose MLflow metrics (ISO 42001: B.6.1.2.2)"
    type: boolean
    default: true
    group: "Monitoring"

  # ---- Resources ----
  - variable: resources.requests.cpu
    label: "CPU Request"
    type: string
    default: "250m"
    group: "Resources"

  - variable: resources.requests.memory
    label: "Memory Request"
    type: string
    default: "512Mi"
    group: "Resources"

  - variable: resources.limits.cpu
    label: "CPU Limit"
    type: string
    default: "1000m"
    group: "Resources"

  - variable: resources.limits.memory
    label: "Memory Limit"
    type: string
    default: "2Gi"
    group: "Resources"

  # ---- Scheduling ----
  - variable: nodeSelector.node-role\.kubernetes\.io/platform
    label: "Pin to Platform Nodes"
    type: string
    default: "true"
    group: "Scheduling"
