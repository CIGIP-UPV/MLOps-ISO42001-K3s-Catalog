# =============================================================================
# Training Jobs — Scheduled Model Retraining
# Plain K3S manifest (CronJob)
# Tier: Platform | RA Component: Retraining Recommendation
# ISO/IEC 42001: B.6.2.6.4
# =============================================================================
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: training-config
  namespace: mlops
data:
  MLFLOW_TRACKING_URI: "http://mlflow.mlops.svc.cluster.local:5000"
  MLFLOW_S3_ENDPOINT_URL: "http://minio.minio.svc.cluster.local:9000"
  TIMESCALEDB_HOST: "timescaledb.platform.svc.cluster.local"
  TIMESCALEDB_PORT: "5432"
  TIMESCALEDB_DB: "ai_platform"
  TRAINING_WINDOW_DAYS: "90"
  MIN_SAMPLES: "10000"
  EXPERIMENT_NAME: "predictive-maintenance"
---
apiVersion: v1
kind: Secret
metadata:
  name: training-secrets
  namespace: mlops
type: Opaque
stringData:
  TIMESCALEDB_USER: "training"
  TIMESCALEDB_PASSWORD: "CHANGE_ME"
  AWS_ACCESS_KEY_ID: "CHANGE_ME"        # MinIO access key
  AWS_SECRET_ACCESS_KEY: "CHANGE_ME"    # MinIO secret key
---
# Scheduled retraining CronJob (B.6.2.6.4)
apiVersion: batch/v1
kind: CronJob
metadata:
  name: model-retraining
  namespace: mlops
  labels:
    app: model-retraining
    tier: platform
    ra-component: retraining-recommendation
spec:
  schedule: "0 3 * * 0"              # Every Sunday at 3:00 AM
  concurrencyPolicy: Forbid           # Prevent overlapping training runs
  successfulJobsHistoryLimit: 5
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 14400     # 4-hour timeout
      template:
        metadata:
          labels:
            app: model-retraining
        spec:
          nodeSelector:
            node-role.kubernetes.io/platform: "true"
          restartPolicy: Never
          containers:
            - name: training
              image: your-registry/model-training:1.0.0  # Replace
              envFrom:
                - configMapRef:
                    name: training-config
                - secretRef:
                    name: training-secrets
              volumeMounts:
                - name: training-workspace
                  mountPath: /workspace
              resources:
                requests:
                  cpu: "2000m"
                  memory: "4Gi"
                limits:
                  cpu: "4000m"
                  memory: "8Gi"
                  # nvidia.com/gpu: "1"   # Uncomment for GPU training
          volumes:
            - name: training-workspace
              persistentVolumeClaim:
                claimName: training-workspace
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: training-workspace
  namespace: mlops
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 20Gi
---
# Drift-triggered retraining Job template (manual or event-triggered)
apiVersion: batch/v1
kind: Job
metadata:
  name: drift-retraining-manual
  namespace: mlops
  labels:
    app: model-retraining
    trigger: drift
spec:
  backoffLimit: 1
  activeDeadlineSeconds: 14400
  template:
    metadata:
      labels:
        app: model-retraining
        trigger: drift
    spec:
      nodeSelector:
        node-role.kubernetes.io/platform: "true"
      restartPolicy: Never
      containers:
        - name: training
          image: your-registry/model-training:1.0.0
          env:
            - name: TRAINING_MODE
              value: "drift-triggered"
            - name: DRIFT_SIGNAL_SOURCE
              value: "prometheus"
          envFrom:
            - configMapRef:
                name: training-config
            - secretRef:
                name: training-secrets
          volumeMounts:
            - name: training-workspace
              mountPath: /workspace
          resources:
            requests:
              cpu: "2000m"
              memory: "4Gi"
            limits:
              cpu: "4000m"
              memory: "8Gi"
      volumes:
        - name: training-workspace
          persistentVolumeClaim:
            claimName: training-workspace
