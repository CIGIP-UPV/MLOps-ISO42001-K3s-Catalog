# =============================================================================
# Training Jobs — Scheduled Model Retraining
# Full Helm chart with ConfigMap, Secret, CronJob, Job, and PVC
# Tier: Platform | RA Component: Retraining Recommendation
# ISO/IEC 42001: B.6.2.6.4
# =============================================================================

# -----------------------------------------------------------------------
# Namespace
# -----------------------------------------------------------------------
namespace: platform

# -----------------------------------------------------------------------
# ConfigMap — Training configuration
# -----------------------------------------------------------------------
configMap:
  name: training-config
  data:
    MLFLOW_TRACKING_URI: "http://mlflow.platform.svc.cluster.local:5000"
    MLFLOW_S3_ENDPOINT_URL: "http://minio.minio.svc.cluster.local:9000"
    TIMESCALEDB_HOST: "timescaledb.platform.svc.cluster.local"
    TIMESCALEDB_PORT: "5432"
    TIMESCALEDB_DB: "ai_platform"
    TRAINING_WINDOW_DAYS: "90"
    MIN_SAMPLES: "10000"
    EXPERIMENT_NAME: "predictive-maintenance"

# -----------------------------------------------------------------------
# Secret — Training credentials
# -----------------------------------------------------------------------
secret:
  name: training-secrets
  data:
    TIMESCALEDB_USER: "training"
    TIMESCALEDB_PASSWORD: "CHANGE_ME"
    AWS_ACCESS_KEY_ID: "CHANGE_ME"        # MinIO access key
    AWS_SECRET_ACCESS_KEY: "CHANGE_ME"    # MinIO secret key

# -----------------------------------------------------------------------
# CronJob — Scheduled retraining (B.6.2.6.4)
# -----------------------------------------------------------------------
cronJob:
  enabled: true
  name: model-retraining
  schedule: "0 3 * * 0"              # Every Sunday at 3:00 AM
  concurrencyPolicy: Forbid           # Prevent overlapping training runs
  successfulJobsHistoryLimit: 5
  failedJobsHistoryLimit: 3
  backoffLimit: 2
  activeDeadlineSeconds: 14400        # 4-hour timeout

# -----------------------------------------------------------------------
# Job — Drift-triggered retraining (manual or event-triggered)
# -----------------------------------------------------------------------
job:
  enabled: false                      # Set to true to enable manual/event-triggered job
  name: drift-retraining-manual
  backoffLimit: 1
  activeDeadlineSeconds: 14400

# -----------------------------------------------------------------------
# Training container
# -----------------------------------------------------------------------
container:
  image: "your-registry/model-training:1.0.0"  # Replace with your registry
  imagePullPolicy: IfNotPresent
  resources:
    requests:
      cpu: "2000m"
      memory: "4Gi"
    limits:
      cpu: "4000m"
      memory: "8Gi"
  # Uncomment to enable GPU support
  # gpuRequests: "1"

# -----------------------------------------------------------------------
# PersistentVolumeClaim — Training workspace
# -----------------------------------------------------------------------
pvc:
  enabled: true
  name: training-workspace
  storageClass: local-path
  accessModes:
    - ReadWriteOnce
  size: 20Gi

# -----------------------------------------------------------------------
# Node placement
# -----------------------------------------------------------------------
nodeSelector:
  node-role.kubernetes.io/platform: "true"

# -----------------------------------------------------------------------
# Labels and annotations
# -----------------------------------------------------------------------
labels:
  app: model-retraining
  tier: platform
  ra-component: retraining-recommendation

annotations: {}

restartPolicy: Never
