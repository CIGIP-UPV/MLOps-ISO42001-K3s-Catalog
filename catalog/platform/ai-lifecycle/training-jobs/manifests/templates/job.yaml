{{- if .Values.job.enabled }}
# =============================================================================
# Job — Drift-Triggered Model Retraining (Manual or Event-Triggered)
# ISO/IEC 42001: B.6.2.6.4
# =============================================================================
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Values.job.name }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "platform-training-jobs.labels" . | nindent 4 }}
    {{- with .Values.labels }}
    app: {{ .app }}
    tier: {{ .tier }}
    ra-component: {{ .ra-component }}
    trigger: drift
    {{- end }}
  {{- with .Values.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  backoffLimit: {{ .Values.job.backoffLimit }}
  activeDeadlineSeconds: {{ .Values.job.activeDeadlineSeconds }}
  template:
    metadata:
      labels:
        {{- with .Values.labels }}
        app: {{ .app }}
        {{- end }}
        {{- include "platform-training-jobs.selectorLabels" . | nindent 12 }}
        trigger: drift
    spec:
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 12 }}
      restartPolicy: {{ .Values.restartPolicy }}
      containers:
        - name: training
          image: {{ .Values.container.image }}
          imagePullPolicy: {{ .Values.container.imagePullPolicy }}
          env:
            - name: TRAINING_MODE
              value: "drift-triggered"
            - name: DRIFT_SIGNAL_SOURCE
              value: "prometheus"
          envFrom:
            - configMapRef:
                name: {{ .Values.configMap.name }}
            - secretRef:
                name: {{ .Values.secret.name }}
          volumeMounts:
            - name: training-workspace
              mountPath: /workspace
          {{- with .Values.container.resources }}
          resources:
            {{- toYaml . | nindent 16 }}
          {{- end }}
          {{- if .Values.container.gpuRequests }}
          # GPU support
          # resources:
          #   limits:
          #     nvidia.com/gpu: {{ .Values.container.gpuRequests }}
          {{- end }}
      volumes:
        - name: training-workspace
          persistentVolumeClaim:
            claimName: {{ .Values.pvc.name }}
{{- end }}
