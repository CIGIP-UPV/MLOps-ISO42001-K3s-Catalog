{{- if .Values.configMap }}
# =============================================================================
# ConfigMap — Training Job Configuration
# ISO/IEC 42001: B.6.2.6.4
# =============================================================================
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.configMap.name }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "platform-training-jobs.labels" . | nindent 4 }}
data:
  {{- with .Values.configMap.data }}
  MLFLOW_TRACKING_URI: {{ .MLFLOW_TRACKING_URI | quote }}
  MLFLOW_S3_ENDPOINT_URL: {{ .MLFLOW_S3_ENDPOINT_URL | quote }}
  TIMESCALEDB_HOST: {{ .TIMESCALEDB_HOST | quote }}
  TIMESCALEDB_PORT: {{ .TIMESCALEDB_PORT | quote }}
  TIMESCALEDB_DB: {{ .TIMESCALEDB_DB | quote }}
  TRAINING_WINDOW_DAYS: {{ .TRAINING_WINDOW_DAYS | quote }}
  MIN_SAMPLES: {{ .MIN_SAMPLES | quote }}
  EXPERIMENT_NAME: {{ .EXPERIMENT_NAME | quote }}
  {{- end }}
{{- end }}
