# =============================================================================
# Grafana — Dashboards, Goal-oriented Monitoring & Feedback Interface
# Helm chart: grafana/grafana
# Tier: Platform + Enterprise | RA Component: Multiple
# ISO/IEC 42001: B.6.1.2.2, B.6.1.3.1, B.6.1.3.3, B.6.2.6.2, B.6.2.6.3
# =============================================================================

# -----------------------------------------------------------------------------
# Image
# -----------------------------------------------------------------------------
image:
  repository: grafana/grafana
  tag: "11.0.0"

replicas: 1

# -----------------------------------------------------------------------------
# Admin credentials
# -----------------------------------------------------------------------------
adminUser: admin
adminPassword: ""                   # Use existingSecret in production
# admin:
#   existingSecret: grafana-admin
#   userKey: admin-user
#   passwordKey: admin-password

# -----------------------------------------------------------------------------
# Persistence
# -----------------------------------------------------------------------------
persistence:
  enabled: true
  storageClassName: local-path
  accessModes:
    - ReadWriteOnce
  size: 10Gi

# -----------------------------------------------------------------------------
# Service
# -----------------------------------------------------------------------------
service:
  type: ClusterIP
  port: 3000

# -----------------------------------------------------------------------------
# Ingress — Traefik (K3S default)
# -----------------------------------------------------------------------------
ingress:
  enabled: true
  ingressClassName: traefik
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
  hosts:
    - grafana.platform.local
  path: /
  tls: []
  # - secretName: grafana-tls
  #   hosts:
  #     - grafana.platform.local

# -----------------------------------------------------------------------------
# Data sources — auto-provisioned
# -----------------------------------------------------------------------------
datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      # Prometheus — metrics (B.6.1.2.2, B.6.2.6.2)
      - name: Prometheus
        type: prometheus
        url: http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090
        access: proxy
        isDefault: true

      # Loki — logs (B.6.2.8.1)
      - name: Loki
        type: loki
        url: http://loki.monitoring.svc.cluster.local:3100
        access: proxy

      # TimescaleDB — KPI data (B.6.2.6.3)
      - name: TimescaleDB
        type: postgres
        url: timescaledb.platform.svc.cluster.local:5432
        database: ai_platform
        user: grafana
        jsonData:
          sslmode: disable
          postgresVersion: 1500
          timescaledb: true
        secureJsonData:
          password: "CHANGE_ME"     # Use existingSecret

      # Edge PostgreSQL — prediction data
      - name: EdgePostgreSQL
        type: postgres
        url: postgresql.edge.svc.cluster.local:5432
        database: predictions
        user: grafana
        jsonData:
          sslmode: disable
        secureJsonData:
          password: "CHANGE_ME"

# -----------------------------------------------------------------------------
# Dashboard providers — auto-load dashboards from ConfigMaps
# -----------------------------------------------------------------------------
dashboardProviders:
  dashboardproviders.yaml:
    apiVersion: 1
    providers:
      - name: 'default'
        orgId: 1
        folder: 'ISO 42001 - AI System'
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/default

# -----------------------------------------------------------------------------
# Pre-built dashboards (provisioned via ConfigMap)
# -----------------------------------------------------------------------------
dashboardsConfigMaps:
  default: grafana-dashboards

# -----------------------------------------------------------------------------
# Grafana configuration (grafana.ini)
# -----------------------------------------------------------------------------
grafana.ini:
  server:
    root_url: "http://grafana.platform.local"
    serve_from_sub_path: false

  # Authentication — Keycloak OIDC (B.6.1.3.1)
  auth.generic_oauth:
    enabled: false                   # Set to true when Keycloak is deployed
    name: Keycloak
    allow_sign_up: true
    client_id: grafana
    client_secret: ""               # Set from Kubernetes Secret
    scopes: openid profile email
    auth_url: https://keycloak.enterprise.local/realms/ai-system/protocol/openid-connect/auth
    token_url: https://keycloak.enterprise.local/realms/ai-system/protocol/openid-connect/token
    api_url: https://keycloak.enterprise.local/realms/ai-system/protocol/openid-connect/userinfo
    role_attribute_path: "contains(groups[*], 'admin') && 'Admin' || contains(groups[*], 'data-scientist') && 'Editor' || 'Viewer'"

  # Alerting (B.8.0.5.1)
  unified_alerting:
    enabled: true

  # Annotations (B.6.1.3.3 — Feedback Interface)
  annotations:
    enable: true

  # Security
  security:
    admin_user: admin
    disable_gravatar: true
    cookie_secure: false             # Set to true with HTTPS

# -----------------------------------------------------------------------------
# Alerting — contact points for incident communication (B.8.0.5.1)
# -----------------------------------------------------------------------------
alerting:
  contactpoints.yaml:
    apiVersion: 1
    contactPoints:
      - orgId: 1
        name: Zammad Helpdesk
        receivers:
          - uid: zammad
            type: webhook
            settings:
              url: "http://zammad.helpdesk.svc.cluster.local:3000/api/v1/webhook"
              httpMethod: POST
      - orgId: 1
        name: Data Science Team
        receivers:
          - uid: ds-team
            type: email
            settings:
              addresses: "datascience@plant.local"

# -----------------------------------------------------------------------------
# Resources
# -----------------------------------------------------------------------------
resources:
  requests:
    cpu: "250m"
    memory: "256Mi"
  limits:
    cpu: "1000m"
    memory: "1Gi"

# -----------------------------------------------------------------------------
# Node placement
# -----------------------------------------------------------------------------
nodeSelector:
  node-role.kubernetes.io/platform: "true"
