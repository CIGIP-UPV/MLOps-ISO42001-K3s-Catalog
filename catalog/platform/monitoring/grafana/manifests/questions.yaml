# =============================================================================
# Rancher Questions — Grafana (Dashboards & Monitoring)
# ISO/IEC 42001: B.6.1.2.2, B.6.1.3.1, B.6.1.3.3, B.6.2.6.2, B.6.2.6.3
# =============================================================================
categories:
  - "Platform"
  - "Monitoring"

questions:

  # ---- Admin ----
  - variable: adminUser
    label: "Admin Username"
    type: string
    default: "admin"
    group: "Admin"

  - variable: adminPassword
    label: "Admin Password"
    type: password
    default: ""
    required: true
    group: "Admin"

  # ---- Networking ----
  - variable: service.type
    label: "Service Type"
    type: enum
    default: "ClusterIP"
    options:
      - "ClusterIP"
      - "NodePort"
      - "LoadBalancer"
    group: "Networking"

  - variable: service.port
    label: "Service Port"
    type: int
    default: 3000
    group: "Networking"

  - variable: ingress.enabled
    label: "Enable Ingress"
    type: boolean
    default: true
    group: "Networking"

  - variable: ingress.hosts[0]
    label: "Ingress Hostname"
    type: hostname
    default: "grafana.platform.local"
    show_if: "ingress.enabled=true"
    group: "Networking"

  - variable: ingress.tls[0].secretName
    label: "TLS Secret Name"
    description: "Leave empty for HTTP only"
    type: string
    default: ""
    show_if: "ingress.enabled=true"
    group: "Networking"

  # ---- Keycloak OIDC (B.6.1.3.1) ----
  - variable: grafana\.ini.auth\.generic_oauth.enabled
    label: "Enable Keycloak OIDC"
    description: "Authenticate users via Keycloak (ISO 42001: B.6.1.3.1)"
    type: boolean
    default: false
    group: "Authentication"

  - variable: grafana\.ini.auth\.generic_oauth.client_id
    label: "Keycloak Client ID"
    type: string
    default: "grafana"
    show_if: "grafana\\.ini.auth\\.generic_oauth.enabled=true"
    group: "Authentication"

  - variable: grafana\.ini.auth\.generic_oauth.client_secret
    label: "Keycloak Client Secret"
    type: password
    default: ""
    show_if: "grafana\\.ini.auth\\.generic_oauth.enabled=true"
    group: "Authentication"

  - variable: grafana\.ini.auth\.generic_oauth.auth_url
    label: "Keycloak Auth URL"
    type: string
    default: "https://keycloak.enterprise.local/realms/ai-system/protocol/openid-connect/auth"
    show_if: "grafana\\.ini.auth\\.generic_oauth.enabled=true"
    group: "Authentication"

  # ---- Data Sources ----
  - variable: datasources.datasources\.yaml.datasources[0].url
    label: "Prometheus URL"
    type: string
    default: "http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090"
    group: "Data Sources"

  - variable: datasources.datasources\.yaml.datasources[1].url
    label: "Loki URL"
    type: string
    default: "http://loki.monitoring.svc.cluster.local:3100"
    group: "Data Sources"

  # ---- Persistence ----
  - variable: persistence.storageClassName
    label: "Storage Class"
    type: storageclass
    default: "local-path"
    group: "Storage"

  - variable: persistence.size
    label: "Volume Size"
    type: string
    default: "10Gi"
    group: "Storage"

  # ---- Alerting (B.8.0.5.1) ----
  - variable: grafana\.ini.unified_alerting.enabled
    label: "Enable Unified Alerting"
    description: "Grafana-managed alert rules and contact points"
    type: boolean
    default: true
    group: "Alerting"

  # ---- Resources ----
  - variable: resources.requests.cpu
    label: "CPU Request"
    type: string
    default: "250m"
    group: "Resources"

  - variable: resources.requests.memory
    label: "Memory Request"
    type: string
    default: "256Mi"
    group: "Resources"

  - variable: resources.limits.cpu
    label: "CPU Limit"
    type: string
    default: "1000m"
    group: "Resources"

  - variable: resources.limits.memory
    label: "Memory Limit"
    type: string
    default: "1Gi"
    group: "Resources"

  # ---- Scheduling ----
  - variable: nodeSelector.node-role\.kubernetes\.io/platform
    label: "Pin to Platform Nodes"
    type: string
    default: "true"
    group: "Scheduling"
