# =============================================================================
# Storage Classes — K3S persistent storage configuration
# Note: K3S ships with 'local-path' as default StorageClass.
# These additional classes are optional for production environments.
# =============================================================================

# ---- Default K3S local-path (already included in K3S) ----
# No action needed. K3S installs local-path-provisioner by default.
# All values.yaml files reference storageClass: local-path

# ---- Optional: Longhorn (recommended for production HA) ----
# Longhorn provides replicated, distributed block storage for K3S.
# Install via Helm:
#   helm repo add longhorn https://charts.longhorn.io
#   helm install longhorn longhorn/longhorn --namespace longhorn-system --create-namespace
#
# Uncomment below after installing Longhorn:

# ---
# apiVersion: storage.k8s.io/v1
# kind: StorageClass
# metadata:
#   name: longhorn
#   annotations:
#     storageclass.kubernetes.io/is-default-class: "false"
# provisioner: driver.longhorn.io
# allowVolumeExpansion: true
# reclaimPolicy: Retain              # Retain data on PVC deletion
# parameters:
#   numberOfReplicas: "2"            # Data replication across nodes
#   staleReplicaTimeout: "30"
#   dataLocality: "best-effort"

# ---- Optional: NFS StorageClass (for shared access) ----
# Useful when multiple pods need ReadWriteMany access.
# Requires NFS server and nfs-subdir-external-provisioner.

# ---
# apiVersion: storage.k8s.io/v1
# kind: StorageClass
# metadata:
#   name: nfs
# provisioner: k8s-sigs.io/nfs-subdir-external-provisioner
# parameters:
#   server: nfs-server.local
#   path: /exports/k3s
# reclaimPolicy: Retain
# allowVolumeExpansion: true
